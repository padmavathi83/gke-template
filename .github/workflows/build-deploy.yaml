name: ui - Build and Deploy

on:
  pull_request:
    paths:
      - 'apps/ui/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (non-prod or prod)"
        required: true
        default: "non-prod"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: |
          SHA=${{ github.event.pull_request.head.sha || github.sha }}
          echo "short_sha=${SHA::7}" >> $GITHUB_OUTPUT
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and Push Docker image
        env:
          SHORT_SHA: ${{ steps.vars.outputs.short_sha }}
          IMAGE_NAME: ghcr.io/${{ github.repository }}/ui
        run: |
          IMAGE_ID=$(echo $IMAGE_NAME | tr '[A-Z]' '[a-z]')
          docker build -f apps/ui/Dockerfile -t $IMAGE_ID:$SHORT_SHA .
          docker push $IMAGE_ID:$SHORT_SHA

  deploy:
    name: Deploy to ${{ github.event.inputs.environment }}
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v3
        id: auth
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.auth_token }}
          registry: us-central1-docker.pkg.dev

      - name: Retag and Push Image to GAR
        env:
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
          GHCR_REGISTRY: ghcr.io/${{ github.repository }}
          GAR_PROJECT: ${{ vars.GCP_PROJECT_ID }}
          GAR_REPO: ${{ vars.GCP_ARTIFACT_REPO }}
          ENV: ${{ github.event.inputs.environment }}
        run: |
          GHCR_IMAGE=$(echo "$GHCR_REGISTRY/ui:$SHORT_SHA" | tr '[A-Z]' '[a-z]')
          GAR_IMAGE="us-central1-docker.pkg.dev/$GAR_PROJECT/$GAR_REPO/ui"
          docker pull $GHCR_IMAGE
          docker tag $GHCR_IMAGE $GAR_IMAGE:$SHORT_SHA
          docker tag $GHCR_IMAGE $GAR_IMAGE:$ENV
          docker push $GAR_IMAGE:$SHORT_SHA
          docker push $GAR_IMAGE:$ENV

      - uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ vars.GKE_CLUSTER_NAME }}

      - name: Deploy to GKE
        env:
          SHORT_SHA: ${{ needs.build.outputs.short_sha }}
          ENV: ${{ github.event.inputs.environment }}
        run: |
          helm upgrade ui --install \
            --namespace vbt-$ENV \
            --values ./apps/ui/helm/values.$ENV.yaml \
            --set image.tag=$SHORT_SHA \
            ./deploy/helm/app
