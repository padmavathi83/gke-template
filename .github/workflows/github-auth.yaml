name: GCP OIDC Auth Test

on:
  push:
   branches:
    - feat/gke

permissions:
  id-token: write   # REQUIRED
  contents: read

jobs:
  auth-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/128046131668/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-sa@gke-paddu.iam.gserviceaccount.com"

      - name: Verify identity
        run: gcloud auth list

      - name: Test access
        run: gcloud projects list
