name: GCP OIDC Auth Test

on:
  push:
    branches:
      - main   # change if your branch is 

permissions:
  id-token: write   # REQUIRED for OIDC
  contents: read

jobs:
  auth-test:
   runs-on: ubuntu-latest


   steps:
   - name: Checkout repository
     uses: actions/checkout@v4

   - name: Authenticate to Google Cloud
     id: auth
     uses: google-github-actions/auth@v2
     with:
      workload_identity_provider: projects/428641430361/locations/global/workloadIdentityPools/github-pool/providers/github-provider
      service_account: github-sa@project-eb9a3368-5e31-47ac-837.iam.gserviceaccount.com

   - name: Print OIDC token claims
     run: |
      echo "${ACTIONS_ID_TOKEN}" | jq -R 'split(".") | .[1] | @base64d | fromjson'


   - name: Set up gcloud CLI
     uses: google-github-actions/setup-gcloud@v2

   - name: Verify authentication
     run: gcloud auth list

   - name: Test GCP access
     run: gcloud projects list

